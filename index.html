<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LunaBrew Character Hub</title>

<link rel="stylesheet" href="./style.css?v=90">
</head>

<body>

<header class="site-header">
    <h1>🌙 LunaBrew Character Hub 🌙</h1>
    <p class="tagline">Characters, stories, and memories.</p>

    <div class="hub-description">
        <p>
            Welcome to my cozy little character archive — a soft LunaBrew space for references,
            profiles, galleries, lore, relationships, and all the characters I love most.
        </p>
    </div>

    <p id="characterCount" class="character-count">Loading characters...</p>
</header>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search characters by name, species, folder, status, or tag...">
</div>

<main>
    <div id="folderContainer" class="folder-container">
        <p class="loading">Loading characters...</p>
    </div>
</main>

<script>
const API_URL = "https://lunabreww.crysthigpen.workers.dev";

const folderContainer = document.getElementById("folderContainer");
const searchInput = document.getElementById("searchInput");
const characterCount = document.getElementById("characterCount");

let allCharacters = [];

function getImage(path) {
    if (!path) return "images/placeholder.png";

    path = String(path).trim();

    if (path.startsWith("http")) return path;

    if (path.startsWith("/")) {
        return window.location.origin + path;
    }

    return window.location.origin + "/" + path;
}

function updateCount(showing, total) {
    if (total === 0) {
        characterCount.textContent = "No public characters yet.";
        return;
    }

    if (showing === total) {
        characterCount.textContent = `${total} public character${total === 1 ? "" : "s"}`;
    } else {
        characterCount.textContent = `Showing ${showing} of ${total} character${total === 1 ? "" : "s"}`;
    }
}

function groupByFolder(characters) {
    const folders = {};

    characters.forEach(character => {
        const folderName = character.folder && String(character.folder).trim()
            ? character.folder
            : "Unsorted";

        if (!folders[folderName]) {
            folders[folderName] = [];
        }

        folders[folderName].push(character);
    });

    return folders;
}

function sortFolderNames(folderNames) {
    const folderOrder = [
        "Mains",
        "Mascots",
        "Comfort Characters",
        "Primary",,
        "Secondary",
        "Tertiary",
        "Unsorted"
    ];

    return folderNames.sort((a, b) => {
        const indexA = folderOrder.indexOf(a);
        const indexB = folderOrder.indexOf(b);

        if (indexA === -1 && indexB === -1) {
            return a.localeCompare(b);
        }

        if (indexA === -1) return 1;
        if (indexB === -1) return -1;

        return indexA - indexB;
    });
}


async function loadCharacters() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        if (!Array.isArray(data)) {
            folderContainer.innerHTML = "<p class='loading'>The API loaded, but did not return a character list.</p>";
            characterCount.textContent = "Could not count characters.";
            return;
        }

        allCharacters = data;
        renderCharacters(allCharacters);

    } catch (error) {
        console.error(error);
        folderContainer.innerHTML = "<p class='loading'>Could not load characters.</p>";
        characterCount.textContent = "Could not load character count.";
    }
}

function createCharacterCard(character) {
    const name = character.name || "Unnamed";
    const slug = character.slug || "";
    const species = character.species || "Unknown Species";
    const icon = getImage(character.icon);

    const card = document.createElement("a");
    card.className = "character-card";

    // IMPORTANT:
    // This links to the universal character page with the slug included.
    // Do not change this back to characters/sabrina.html.
    card.href = `characters/index.html?slug=${encodeURIComponent(slug)}`;

    card.innerHTML = `
        ${character.favorite ? `<span class="favorite-badge">⭐ Favorite</span>` : ""}
        <img src="${icon}" alt="${name}">
        <h2>${name}</h2>
        <p>${species}</p>
    `;

    return card;
}

function renderCharacters(characters) {
    folderContainer.innerHTML = "";

    if (!characters || characters.length === 0) {
        folderContainer.innerHTML = "<p class='loading'>No characters found.</p>";
        updateCount(0, allCharacters.length);
        return;
    }

    const folders = groupByFolder(characters);
    const folderNames = sortFolderNames(Object.keys(folders));

    folderNames.forEach(folderName => {
        const section = document.createElement("section");
        section.className = "folder-section";

        const heading = document.createElement("div");
        heading.className = "folder-heading";

        heading.innerHTML = `
            <div class="folder-title">
                <span class="folder-arrow">▼</span>
                <h2>${folderName}</h2>
            </div>

            <span>${folders[folderName].length} character${folders[folderName].length === 1 ? "" : "s"}</span>
        `;

        const grid = document.createElement("div");
        grid.className = "character-grid";

        folders[folderName].forEach(character => {
            grid.appendChild(createCharacterCard(character));
        });

        heading.addEventListener("click", () => {
            section.classList.toggle("collapsed");

            const arrow = heading.querySelector(".folder-arrow");

            if (section.classList.contains("collapsed")) {
                arrow.textContent = "▶";
            } else {
                arrow.textContent = "▼";
            }
        });

        section.appendChild(heading);
        section.appendChild(grid);

        folderContainer.appendChild(section);
    });

    updateCount(characters.length, allCharacters.length);
}

searchInput.addEventListener("input", () => {
    const value = searchInput.value.toLowerCase().trim();

    const filtered = allCharacters.filter(character => {
        const name = (character.name || "").toLowerCase();
        const species = (character.species || "").toLowerCase();
        const slug = (character.slug || "").toLowerCase();
        const folder = (character.folder || "").toLowerCase();
        const status = (character.status || "").toLowerCase();
        const tags = Array.isArray(character.tags) ? character.tags.join(" ").toLowerCase() : "";

        return (
            name.includes(value) ||
            species.includes(value) ||
            slug.includes(value) ||
            folder.includes(value) ||
            status.includes(value) ||
            tags.includes(value)
        );
    });

    renderCharacters(filtered);
});

loadCharacters();
</script>

</body>
</html>
